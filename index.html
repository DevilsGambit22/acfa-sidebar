<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ACFA Live Sidebar</title>
<style>
  body{
    margin:0;
    background:#050505;
    color:white;
    font-family:Arial,sans-serif;
  }
  .wrap{
    background:linear-gradient(180deg,#050505,#111);
    border:2px solid gold;
    border-radius:16px;
    padding:14px;
    box-shadow:0 0 18px gold;
  }
  h1{
    color:gold;
    text-align:center;
    font-size:22px;
    text-shadow:0 0 12px gold;
    margin:8px 0;
  }
  .marquee{
    color:gold;
    font-weight:bold;
    border:1px solid gold;
    border-radius:10px;
    padding:8px;
    margin-bottom:12px;
    background:#111;
  }
  .card{
    background:#0d0d0d;
    border:1px solid #d4af37;
    border-radius:12px;
    padding:12px;
    margin:12px 0;
    box-shadow:0 0 10px rgba(255,215,0,.4);
  }
  .stat{
    font-size:28px;
    color:gold;
    text-align:center;
    font-weight:bold;
  }
  .member a{
    display:block;
    color:white;
    text-decoration:none;
    background:#161616;
    border:1px solid #444;
    border-radius:8px;
    padding:7px;
    margin:6px 0;
  }
  .member a:hover{
    border-color:gold;
    color:gold;
  }
  button{
    background:gold;
    color:#111;
    border:none;
    border-radius:10px;
    padding:10px 14px;
    font-weight:bold;
    cursor:pointer;
    width:100%;
  }
  .small{
    color:#ccc;
    font-size:12px;
    text-align:center;
  }
</style>
</head>

<body>
<div class="wrap">

  <h1>♟️ And Chess For All Official ♟️</h1>

  <div class="marquee">
    <marquee scrollamount="5">
      Every Player Belongs • Every Move Matters • Welcome to the ACFA Family
    </marquee>
  </div>

  <div class="card">
    <h2 style="color:gold;text-align:center;">Live Club Count</h2>
    <div id="memberCount" class="stat">Loading...</div>
    <p class="small">Pulled from the Chess.com public club API</p>
  </div>

  <div class="card">
    <h2 style="color:gold;text-align:center;">Recently Listed Members</h2>
    <div id="members">Loading members...</div>
  </div>

  <div class="card">
    <button onclick="location.reload()">Refresh ACFA Board</button>
  </div>

  <p class="small">
    Made by @DevilsGambit22<br>
    © 2026 And Chess For All Official
  </p>

</div>

<script>
const clubSlug = "and-chess-for-all-official";
const apiURL = `https://api.chess.com/pub/club/${clubSlug}/members`;

async function loadACFA(){
  const countBox = document.getElementById("memberCount");
  const membersBox = document.getElementById("members");

  try{
    const res = await fetch(apiURL, {
      headers: {
        "Accept": "application/json"
      }
    });

    if(!res.ok){
      throw new Error("API response failed: " + res.status);
    }

    const data = await res.json();

    let allMembers = [];

    if(data.weekly) allMembers = allMembers.concat(data.weekly);
    if(data.monthly) allMembers = allMembers.concat(data.monthly);
    if(data.all_time) allMembers = allMembers.concat(data.all_time);

    const unique = [];
    const seen = new Set();

    allMembers.forEach(m => {
      if(m.username && !seen.has(m.username.toLowerCase())){
        seen.add(m.username.toLowerCase());
        unique.push(m);
      }
    });

    countBox.innerHTML = unique.length;

    membersBox.innerHTML = unique.slice(0,10).map(m => `
      <div class="member">
        <a href="${m.url}" target="_blank">@${m.username}</a>
      </div>
    `).join("");

    if(unique.length === 0){
      membersBox.innerHTML = "No members returned. Because apparently APIs enjoy drama.";
    }

  }catch(err){
    countBox.innerHTML = "Error";
    membersBox.innerHTML = `
      <p style="color:#ff7777;text-align:center;">
        Could not load Chess.com API.<br>
        ${err.message}
      </p>
    `;
  }
}

loadACFA();
</script>

</body>
</html>
