<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACFA Family Board</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  background:#050505;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

body{padding:8px}

.panel{
  width:100%;
  background:#050505;
  border:2px solid #ffd700;
  border-radius:16px;
  padding:10px;
  box-shadow:0 0 15px #ffd700;
}

.title,.section-title{
  color:#ffd700;
  text-align:center;
  font-weight:bold;
  text-shadow:0 0 8px #ffd700;
}

.title{
  font-size:18px;
  margin-bottom:8px;
}

.section-title{
  font-size:15px;
  margin:12px 0 8px;
  padding-top:8px;
  border-top:1px solid rgba(255,215,0,.35);
}

.member-count{
  text-align:center;
  color:#ffd700;
  font-weight:bold;
  font-size:18px;
  margin-bottom:8px;
  padding:8px;
  border:1px solid rgba(255,215,0,.45);
  border-radius:12px;
  background:#111;
}

.member-card{
  display:flex;
  align-items:center;
  gap:10px;
  background:#141414;
  border:1px solid rgba(255,215,0,.35);
  border-radius:14px;
  padding:8px;
  margin-bottom:8px;
  box-shadow:0 0 8px rgba(255,215,0,.18);
}

.member-avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid #ffd700;
  object-fit:cover;
  flex-shrink:0;
  background:#222;
}

.member-info{
  flex:1;
  min-width:0;
}

.member-name{
  color:#fff;
  font-weight:bold;
  font-size:15px;
  line-height:1.2;
  word-break:break-word;
}

.member-meta{
  color:#cccccc;
  font-size:11px;
  margin-top:2px;
}

.member-joined{
  color:#ffd700;
  font-size:11px;
  margin-top:2px;
  font-weight:bold;
}

.badge{
  color:#00ff88;
  font-size:10px;
  font-weight:bold;
}

.title-badge{
  color:#050505;
  background:#ffd700;
  border-radius:999px;
  padding:2px 6px;
  font-size:10px;
  font-weight:bold;
  margin-right:4px;
}

.footer{
  text-align:center;
  color:#888;
  font-size:10px;
  margin-top:6px;
}

a{
  text-decoration:none;
  display:block;
  width:100%;
}

.loading,.error{
  text-align:center;
  font-size:12px;
  padding:8px;
}

.loading{color:#ccc}
.error{color:#ff7777}

@media screen and (max-width:280px){
  body{padding:6px}
  .panel{padding:8px}
  .title{font-size:16px}
  .member-count{font-size:16px;padding:7px}
  .member-avatar{width:44px;height:44px}
  .member-name{font-size:13px}
}
</style>
</head>

<body>

<div class="panel">

  <div class="title">♟ ACFA FAMILY ♟</div>

  <div id="member-count" class="member-count">Loading...</div>

  <div class="section-title">Newest Members</div>
  <div id="members" class="loading">Loading newest members...</div>

  <div class="section-title">Titled Players</div>
  <div id="titled-players" class="loading">Scanning for titled players...</div>

  <div class="footer">
    Every Player Belongs • Every Move Matters
  </div>

</div>

<script>
async function loadMembers(){

  const clubSlug = "and-chess-for-all-official";
  const membersBox = document.getElementById("members");
  const titledBox = document.getElementById("titled-players");
  const countBox = document.getElementById("member-count");

  const defaultAvatar = "https://www.chess.com/bundles/web/images/user-image.007dad08.svg";

  try{
    const response = await fetch(
      `https://api.chess.com/pub/club/${clubSlug}/members?cacheBust=${Date.now()}`
    );

    const data = await response.json();

    let combined = [
      ...(data.weekly || []),
      ...(data.monthly || []),
      ...(data.all_time || [])
    ];

    const uniqueMap = new Map();

    combined.forEach(member => {
      if(member.username){
        uniqueMap.set(member.username.toLowerCase(), member);
      }
    });

    const members = Array.from(uniqueMap.values());

    countBox.innerHTML = `♟ ${members.length} Members`;

    const profiles = [];

    for(const member of members){
      try{
        const profileResponse = await fetch(
          `https://api.chess.com/pub/player/${member.username}?cacheBust=${Date.now()}`
        );

        const profile = await profileResponse.json();

        profiles.push({
          username: member.username,
          joined: member.joined,
          avatar: profile.avatar || defaultAvatar,
          title: profile.title || ""
        });

      }catch(e){
        profiles.push({
          username: member.username,
          joined: member.joined,
          avatar: defaultAvatar,
          title: ""
        });
      }
    }

    const newest = profiles
      .filter(member => member.username && member.joined)
      .sort((a,b) => Number(b.joined) - Number(a.joined))
      .slice(0,3);

    let newestHTML = "";

    newest.forEach(member => {
      const daysAgo = Math.floor(
        (Date.now() / 1000 - Number(member.joined)) / 86400
      );

      const badge = daysAgo <= 7 ? '<span class="badge"> • NEW</span>' : '';

      const joinedText = daysAgo === 0
        ? "Joined today"
        : `Joined ${daysAgo} day${daysAgo === 1 ? "" : "s"} ago`;

      newestHTML += `
        <a href="https://www.chess.com/member/${member.username}" target="_blank">
          <div class="member-card">
            <img class="member-avatar" src="${member.avatar}" alt="${member.username}">
            <div class="member-info">
              <div class="member-name">@${member.username}${badge}</div>
              <div class="member-meta">ACFA Family</div>
              <div class="member-joined">${joinedText}</div>
            </div>
          </div>
        </a>
      `;
    });

    membersBox.className = "";
    membersBox.innerHTML = newestHTML || `<div class="error">No members found.</div>`;

    const titledPlayers = profiles
      .filter(member => member.title)
      .sort((a,b) => a.title.localeCompare(b.title));

    let titledHTML = "";

    titledPlayers.forEach(member => {
      titledHTML += `
        <a href="https://www.chess.com/member/${member.username}" target="_blank">
          <div class="member-card">
            <img class="member-avatar" src="${member.avatar}" alt="${member.username}">
            <div class="member-info">
              <div class="member-name">
                <span class="title-badge">${member.title}</span>@${member.username}
              </div>
              <div class="member-meta">Official Titled Player</div>
            </div>
          </div>
        </a>
      `;
    });

    titledBox.className = "";
    titledBox.innerHTML = titledHTML || `
      <div class="loading">No titled players found yet.</div>
    `;

  }catch(error){
    countBox.innerHTML = "Unable to load count";

    membersBox.className = "error";
    membersBox.innerHTML = "Unable to load members.";

    titledBox.className = "error";
    titledBox.innerHTML = "Unable to load titled players.";
  }
}

loadMembers();
</script>

</body>
</html>
