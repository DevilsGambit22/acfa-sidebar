<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACFA Family Board</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  background:#050505;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

body{
  padding:8px;
}

.panel{
  width:100%;
  max-width:none;
  background:#050505;
  border:2px solid #ffd700;
  border-radius:16px;
  padding:10px;
  box-shadow:0 0 15px #ffd700;
}

.title{
  color:#ffd700;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  margin-bottom:8px;
  text-shadow:0 0 8px #ffd700;
  letter-spacing:.5px;
}

.member-count{
  width:100%;
  text-align:center;
  color:#ffd700;
  font-weight:bold;
  font-size:18px;
  margin-bottom:8px;
  padding:8px;
  border:1px solid rgba(255,215,0,.45);
  border-radius:12px;
  background:#111;
}

.member-card{
  width:100%;
  display:flex;
  align-items:center;
  gap:10px;
  background:#141414;
  border:1px solid rgba(255,215,0,.35);
  border-radius:14px;
  padding:8px;
  margin-bottom:8px;
  box-shadow:0 0 8px rgba(255,215,0,.18);
}

.member-avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid #ffd700;
  object-fit:cover;
  flex-shrink:0;
  background:#222;
}

.member-info{
  flex:1;
  min-width:0;
  max-width:100%;
}

.member-name{
  color:#fff;
  font-weight:bold;
  font-size:15px;
  line-height:1.2;
  white-space:normal;
  overflow:visible;
  word-break:break-word;
}

.member-meta{
  color:#cccccc;
  font-size:11px;
  margin-top:2px;
}

.member-joined{
  color:#ffd700;
  font-size:11px;
  margin-top:2px;
  font-weight:bold;
}

.badge{
  color:#00ff88;
  font-size:10px;
  font-weight:bold;
  white-space:nowrap;
}

.footer{
  text-align:center;
  color:#888;
  font-size:10px;
  margin-top:6px;
}

a{
  text-decoration:none;
  display:block;
  width:100%;
}

@media screen and (max-width:280px){
  body{
    padding:6px;
  }

  .panel{
    padding:8px;
  }

  .title{
    font-size:16px;
  }

  .member-count{
    font-size:16px;
    padding:7px;
  }

  .member-avatar{
    width:44px;
    height:44px;
  }

  .member-name{
    font-size:13px;
  }
}
</style>
</head>

<body>

<div class="panel">

  <div class="title">♟ ACFA FAMILY ♟</div>

  <div id="member-count" class="member-count">
    Loading...
  </div>

  <div id="members">
    Loading newest members...
  </div>

  <div class="footer">
    Every Player Belongs • Every Move Matters
  </div>

</div>

<script>
async function loadMembers(){

  const clubSlug = "and-chess-for-all-official";
  const membersBox = document.getElementById("members");
  const countBox = document.getElementById("member-count");

  try{

    const response = await fetch(
      `https://api.chess.com/pub/club/${clubSlug}/members?cacheBust=${Date.now()}`
    );

    const data = await response.json();

    let combined = [
      ...(data.weekly || []),
      ...(data.monthly || []),
      ...(data.all_time || [])
    ];

    const uniqueMap = new Map();

    combined.forEach(member => {
      if(member.username){
        uniqueMap.set(member.username.toLowerCase(), member);
      }
    });

    const members = Array.from(uniqueMap.values());

    countBox.innerHTML = `♟ ${members.length} Members`;

    const newest = members
      .filter(member => member.username && member.joined)
      .sort((a,b) => Number(b.joined) - Number(a.joined))
      .slice(0,3);

    let html = "";

    for(const member of newest){

      let avatar = "https://www.chess.com/bundles/web/images/user-image.007dad08.svg";

      try{
        const profileResponse = await fetch(
          `https://api.chess.com/pub/player/${member.username}?cacheBust=${Date.now()}`
        );

        const profile = await profileResponse.json();

        if(profile.avatar){
          avatar = profile.avatar;
        }

      }catch(e){}

      const daysAgo = Math.floor(
        (Date.now() / 1000 - Number(member.joined)) / 86400
      );

      const badge = daysAgo <= 7
        ? '<span class="badge"> • NEW</span>'
        : '';

      const joinedText = daysAgo === 0
        ? "Joined today"
        : `Joined ${daysAgo} day${daysAgo === 1 ? "" : "s"} ago`;

      html += `
        <a href="https://www.chess.com/member/${member.username}" target="_blank">
          <div class="member-card">
            <img class="member-avatar" src="${avatar}" alt="${member.username}">
            <div class="member-info">
              <div class="member-name">@${member.username}${badge}</div>
              <div class="member-meta">ACFA Family</div>
              <div class="member-joined">${joinedText}</div>
            </div>
          </div>
        </a>
      `;
    }

    membersBox.innerHTML = html || `
      <div style="color:#ff7777;text-align:center;font-size:12px;">
        No members found.
      </div>
    `;

  }catch(error){

    countBox.innerHTML = "Unable to load count";

    membersBox.innerHTML = `
      <div style="color:#ff7777;text-align:center;font-size:12px;">
        Unable to load members.
      </div>
    `;
  }
}

loadMembers();
</script>

</body>
</html>
