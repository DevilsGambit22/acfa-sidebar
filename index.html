<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACFA Newest Recruits</title>

<style>
body{
  margin:0;
  padding:10px;
  background:#050505;
  color:white;
  font-family:Arial,sans-serif;
}

.recruits-panel{
  background:linear-gradient(180deg,#070707,#111);
  border:2px solid #ffd700;
  border-radius:18px;
  padding:14px;
  box-shadow:0 0 18px rgba(255,215,0,.7);
}

.panel-title{
  color:#ffd700;
  font-weight:bold;
  font-size:16px;
  margin-bottom:12px;
  letter-spacing:1px;
  border-bottom:2px solid rgba(255,215,0,.6);
  padding-bottom:8px;
  text-align:left;
}

.member-card{
  display:flex;
  align-items:center;
  gap:12px;
  background:#151515;
  border:1px solid rgba(255,215,0,.35);
  border-radius:16px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 0 8px rgba(255,215,0,.25);
}

.member-card:hover{
  border-color:#ffd700;
  box-shadow:0 0 12px rgba(255,215,0,.6);
}

.member-avatar{
  width:54px;
  height:54px;
  border-radius:50%;
  border:3px solid #ffd700;
  object-fit:cover;
  background:#222;
}

.member-info{
  flex:1;
  min-width:0;
}

.member-name{
  color:white;
  font-weight:bold;
  font-size:15px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.member-meta{
  color:#bdbdbd;
  font-size:12px;
  margin-top:3px;
}

.member-rating{
  color:#ffd700;
  font-size:12px;
  margin-top:4px;
  font-weight:bold;
}

a{
  text-decoration:none;
}

.footer{
  color:#aaa;
  text-align:center;
  font-size:11px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="recruits-panel">
  <div class="panel-title">♟ NEWEST RECRUITS ♟</div>
  <div id="newest-members">Loading newest ACFA members...</div>
  <div class="footer">
    Live from And Chess For All Official<br>
    Made by @DevilsGambit22 © 2026
  </div>
</div>

<script>
async function loadNewestMembers(){

  const clubSlug = "and-chess-for-all-official";
  const box = document.getElementById("newest-members");

  try{
    const res = await fetch(`https://api.chess.com/pub/club/${clubSlug}/members`);
    const data = await res.json();

    const members = data.all_time || [];
    const newest = members.slice(-5).reverse();

    let html = "";

    for(const member of newest){

      let avatar = "https://www.chess.com/bundles/web/images/user-image.007dad08.svg";
      let ratingText = "ACFA Family";

      try{
        const profileRes = await fetch(`https://api.chess.com/pub/player/${member.username}`);
        const profile = await profileRes.json();

        if(profile.avatar){
          avatar = profile.avatar;
        }
      }catch(e){}

      html += `
        <a href="${member.url}" target="_blank">
          <div class="member-card">
            <img class="member-avatar" src="${avatar}" alt="${member.username}">
            <div class="member-info">
              <div class="member-name">@${member.username}</div>
              <div class="member-meta">Newest ACFA Recruit</div>
              <div class="member-rating">♟ ${ratingText}</div>
            </div>
          </div>
        </a>
      `;
    }

    box.innerHTML = html;

  }catch(error){
    box.innerHTML = `
      <div style="color:#ff7777;text-align:center;padding:10px;">
        Unable to load newest recruits.
      </div>
    `;
  }
}

loadNewestMembers();
</script>

</body>
</html>
