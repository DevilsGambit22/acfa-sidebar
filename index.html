<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACFA Newest Members</title>

<style>
body{
  margin:0;
  padding:10px;
  background:#050505;
  font-family:Arial,sans-serif;
}

.recruits-panel{
  background:linear-gradient(180deg,#080808,#111);
  border:2px solid #d4af37;
  border-radius:20px;
  padding:14px;
  box-shadow:0 0 18px rgba(255,215,0,.65);
}

.panel-title{
  color:#ffd700;
  font-weight:bold;
  font-size:18px;
  letter-spacing:1px;
  padding-bottom:8px;
  margin-bottom:12px;
  border-bottom:2px solid rgba(255,215,0,.45);
}

.member-card{
  display:flex;
  align-items:center;
  gap:12px;
  background:#141414;
  border:1px solid rgba(255,215,0,.35);
  border-radius:16px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 0 8px rgba(255,215,0,.15);
}

.member-card:hover{
  border-color:#ffd700;
  box-shadow:0 0 14px rgba(255,215,0,.5);
}

.member-avatar{
  width:58px;
  height:58px;
  border-radius:50%;
  border:3px solid #ffd700;
  object-fit:cover;
  flex-shrink:0;
  background:#222;
}

.member-info{
  flex:1;
  min-width:0;
}

.member-name{
  color:#fff;
  font-weight:bold;
  font-size:15px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.member-meta{
  color:#cfcfcf;
  font-size:12px;
  margin-top:3px;
}

.member-joined{
  color:#ffd700;
  font-size:12px;
  margin-top:4px;
  font-weight:bold;
}

.footer{
  text-align:center;
  color:#999;
  font-size:11px;
  margin-top:12px;
}

a{
  text-decoration:none;
}
</style>
</head>

<body>

<div class="recruits-panel">

  <div class="panel-title">
    ♟ NEWEST MEMBERS ♟
  </div>

  <div id="newest-members">
    Loading newest ACFA members...
  </div>

  <div class="footer">
    And Chess For All Official<br>
    Updates depend on Chess.com API cache
  </div>

</div>

<script>
async function loadNewestMembers(){

  const clubSlug = "and-chess-for-all-official";
  const box = document.getElementById("newest-members");

  try{

    const response = await fetch(
      `https://api.chess.com/pub/club/${clubSlug}/members?cacheBust=${Date.now()}`
    );

    const data = await response.json();

    let combinedMembers = [
      ...(data.weekly || []),
      ...(data.monthly || []),
      ...(data.all_time || [])
    ];

    const newest = combinedMembers
      .filter(m => m.username && m.joined)
      .sort((a, b) => Number(b.joined) - Number(a.joined))
      .filter((m, index, self) =>
        index === self.findIndex(x =>
          x.username.toLowerCase() === m.username.toLowerCase()
        )
      )
      .slice(0, 5);

    let html = "";

    for(const member of newest){

      let avatar = "https://www.chess.com/bundles/web/images/user-image.007dad08.svg";

      try{
        const profileResponse = await fetch(
          `https://api.chess.com/pub/player/${member.username}?cacheBust=${Date.now()}`
        );

        const profile = await profileResponse.json();

        if(profile.avatar){
          avatar = profile.avatar;
        }
      }catch(e){}

      const joinedDate = new Date(Number(member.joined) * 1000).toLocaleDateString();

      html += `
        <a href="${member.url || "https://www.chess.com/member/" + member.username}" target="_blank">
          <div class="member-card">
            <img class="member-avatar" src="${avatar}" alt="${member.username}">
            <div class="member-info">
              <div class="member-name">@${member.username}</div>
              <div class="member-meta">Newest ACFA Member</div>
              <div class="member-joined">Joined: ${joinedDate}</div>
            </div>
          </div>
        </a>
      `;
    }

    box.innerHTML = html || `
      <div style="color:#ff7777;text-align:center;padding:12px;">
        No newest members found.
      </div>
    `;

  }catch(error){

    box.innerHTML = `
      <div style="color:#ff7777;text-align:center;padding:12px;">
        Unable to load newest members.
      </div>
    `;
  }
}

loadNewestMembers();
</script>

</body>
</html>
